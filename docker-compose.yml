services:
  mysql:
    image: mysql:8.0
    container_name: biomarkers-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: biomarkers
      MYSQL_USER: biomarkers
      MYSQL_PASSWORD: biomarkers
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
